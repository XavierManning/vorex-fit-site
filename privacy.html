<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#080808">
    <title>Privacy Policy — Vorex</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .termly-frame {
            display: block;
            width: 100%;
            min-height: calc(100vh - 64px - 88px);
            border: 0;
            background: #ffffff;
            border-radius: 12px;
        }
        .termly-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px var(--gutter);
        }
        .termly-title {
            font-family: var(--font-display);
            font-size: clamp(32px, 5vw, 48px);
            letter-spacing: 3px;
            color: var(--gold);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav__inner">
            <a href="/" class="nav__brand" aria-label="Vorex home">
                <img src="/assets/logo.png" alt="" class="nav__brand-mark" width="28" height="28">
                <span>VOREX</span>
            </a>
            <div class="nav__links">
                <a href="/" class="nav__link">Home</a>
                <a href="/terms" class="nav__link">Terms</a>
            </div>
        </div>
    </nav>

    <main class="termly-wrap">
        <h1 class="termly-title">PRIVACY POLICY</h1>
        <iframe
            class="termly-frame"
            src="https://app.termly.io/policy-viewer/policy.html?policyUUID=6a27d4cd-3a80-4a28-98d4-fd8bb4641747"
            title="Vorex Privacy Policy"
            loading="lazy"></iframe>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__bottom">© 2026 Vorex Health LLC.</div>
        </div>
    </footer>
</body>
</html>
