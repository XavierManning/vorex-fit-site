[build]
  command   = "npm install"
  functions = "netlify/functions"
  publish   = "."

# Clean URL redirects — let users hit /success instead of /success.html
[[redirects]]
  from   = "/success"
  to     = "/success.html"
  status = 200

[[redirects]]
  from   = "/cancel"
  to     = "/cancel.html"
  status = 200

[[redirects]]
  from   = "/terms"
  to     = "/terms.html"
  status = 200

[[redirects]]
  from   = "/privacy"
  to     = "/privacy.html"
  status = 200

[[redirects]]
  from   = "/account"
  to     = "/account.html"
  status = 200

# Long-lived caching for static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
